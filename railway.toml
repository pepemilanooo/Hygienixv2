[build]
builder = "nixpacks"

[deploy]
startCommand = "npx prisma migrate deploy && npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[environments.production]
startCommand = "npx prisma migrate deploy && npm start"

[environments.staging]
startCommand = "npx prisma migrate deploy && npm start"
